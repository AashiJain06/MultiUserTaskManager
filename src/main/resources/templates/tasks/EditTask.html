<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TaskManager | CreateTask</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(to right, #e3f2fd, #fce4ec);
        font-family: 'Segoe UI', sans-serif;
    }
    .card {
        border-radius: 12px;
    }
    h2 {
        color: #0d6efd;
        font-weight: bold;
        margin-bottom: 20px;
    }
    .input-group-text {
        background: #0d6efd;
        color: white;
        border: none;
    }
    .btn-primary {
        background: linear-gradient(45deg, #0d6efd, #6610f2);
        border: none;
        transition: 0.3s;
    }
    .btn-primary:hover {
        transform: scale(1.05);
        background: linear-gradient(45deg, #6610f2, #0d6efd);
    }
</style>
</head>
<body>
    <div th:replace="common/header :: header"></div>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg p-4">
                    <h2 class="text-center">Edit Your Task</h2>
                    <form th:action="@{/tasks/{id}(id=${task.id})}" th:object=${task} method="post" role="form">
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-pen"></i></span>
                                <input type="text" name="name" class="form-control" id="name" th:field="*{name}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="discription" class="form-label">Discription</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-align-left"></i></span>
                                <textarea class="form-control" id="discription" name="discription" th:field="*{discription}" rows="3"></textarea>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="startDate" class="form-label">Start_Date</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-calendar-plus"></i></span>
                                <input type="date" name="startDate" class="form-control" id="startDate" th:field="*{startDate}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="endDate" class="form-label">End_Date</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-calendar-check"></i></span>
                                <input type="date" name="enddate" class="form-control" id="endDate" th:field="*{endDate}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="priority" class="form-label">Priority</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-flag"></i></span>
                                <select class="form-control" id="priority" th:field="*{priority}">
                                    <option value="HIGH">HIGH</option>
                                    <option value="LOW">LOW</option>
                                    <option value="MEDIUM">MEDIUM</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-list-check"></i></span>
                                <select class="form-control" id="status" th:field="*{status}">
                                    <option value="TODO">Todo</option>
                                    <option value="Pending">Pending</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary px-5">
                                <i class="fa-solid fa-plus"></i> UpdateTask
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
